name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Placeholder — build-ul are nevoie de o valoare validă la parse time, nu se conectează
      # efectiv la nicio bază de date reală în acest job.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # nu "npm ci": e strict la potrivirea exactă cu versiunea de npm care a generat
      # lockfile-ul (poate diferi de npm-ul mașinii de dev) — a picat CI-ul din cauza asta.
      - run: npm install

      - run: npm run lint

      - run: npm run test

      - run: npm run build
