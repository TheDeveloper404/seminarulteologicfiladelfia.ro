version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    # "matur" = doar patch/minor primesc PR automat; major (breaking changes) e ignorat aici,
    # verificat manual când chiar e nevoie — evită PR-uri de breaking changes nesupravegheate.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

# Ecosistemul "github-actions" a fost eliminat: repo-ul nu are workflow-uri sub
# .github/workflows/ (deploy-ul e manual pe VPS, nu prin CI) — Dependabot eșua sigur, negăsind
# nimic de verificat. Se readaugă dacă vreodată apare un workflow real.
